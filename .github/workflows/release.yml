name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Select the version bump to prepare
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
  push:
    branches:
      - main
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release_pr:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Bump version
        run: npm version "${{ github.event.inputs.version_bump }}" --no-git-tag-version

      - name: Read new version
        id: version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release pull request
        id: release_pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/v${{ steps.version.outputs.value }}
          commit-message: Release v${{ steps.version.outputs.value }}
          title: Release v${{ steps.version.outputs.value }}
          body: |
            This PR prepares release `v${{ steps.version.outputs.value }}`.

            After this PR is merged to `main`, the release workflow will:
            - create the `v${{ steps.version.outputs.value }}` tag
            - create a GitHub release
            - publish the package to npm via Trusted Publisher
          delete-branch: true

      - name: Enable auto-merge for release pull request
        if: steps.release_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.release_pr.outputs.pull-request-number }}" --auto --squash

  publish_release:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request_target' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - name: Read package metadata
        id: package
        run: |
          NAME=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).name")
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check for existing tag
        id: tag
        run: |
          if git rev-parse "v${{ steps.package.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read npm latest version
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}" version >/dev/null 2>&1; then
            VERSION=$(npm view "${{ steps.package.outputs.name }}" version)
            echo "latest=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "latest=" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to publish
        id: release
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          NPM_LATEST_VERSION: ${{ steps.npm.outputs.latest }}
        run: |
          SHOULD_PUBLISH=$(node <<'EOF'
          const parse = version => version.split('.').map(part => Number.parseInt(part, 10));
          const current = process.env.PACKAGE_VERSION;
          const latest = process.env.NPM_LATEST_VERSION;

          if (!latest) {
            console.log('true');
            process.exit(0);
          }

          const currentParts = parse(current);
          const latestParts = parse(latest);
          const maxLength = Math.max(currentParts.length, latestParts.length);

          for (let index = 0; index < maxLength; index += 1) {
            const currentPart = currentParts[index] ?? 0;
            const latestPart = latestParts[index] ?? 0;
            if (currentPart > latestPart) {
              console.log('true');
              process.exit(0);
            }
            if (currentPart < latestPart) {
              console.log('false');
              process.exit(0);
            }
          }

          console.log('false');
          EOF
          )

          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"

          if [ "${SHOULD_PUBLISH}" = "true" ]; then
            echo "Package version v${PACKAGE_VERSION} is newer than npm latest v${NPM_LATEST_VERSION:-none} and will be released."
          else
            echo "Package version v${PACKAGE_VERSION} is not newer than npm latest v${NPM_LATEST_VERSION:-none}; skipping publish."
          fi

      - name: Set up Node.js
        if: steps.release.outputs.should_publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.release.outputs.should_publish == 'true'
        run: npm ci

      - name: Lint
        if: steps.release.outputs.should_publish == 'true'
        run: npm run lint

      - name: Build
        if: steps.release.outputs.should_publish == 'true'
        run: npm run build

      - name: Create tag
        if: steps.release.outputs.should_publish == 'true' && steps.tag.outputs.exists != 'true'
        run: git tag "v${{ steps.package.outputs.version }}"

      - name: Push tag
        if: steps.release.outputs.should_publish == 'true' && steps.tag.outputs.exists != 'true'
        run: git push origin "v${{ steps.package.outputs.version }}"

      - name: Create GitHub release
        if: steps.release.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          generate_release_notes: true

      - name: Publish to npm
        if: steps.release.outputs.should_publish == 'true'
        run: npm publish --access public
